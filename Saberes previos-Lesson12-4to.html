<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control del sistema</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#e8f1ff,#f4f8ff);
text-align:center;
}

h1{color:#1b3c6b;}

.container{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin:20px;
}

.box{
background:white;
border:2px solid #2f5ea8;
border-radius:10px;
padding:15px;
width:240px;
}

.led{
width:50px;height:50px;border-radius:50%;
background:black;margin:auto;
}

.option{
display:block;
margin:10px auto;
padding:10px;
width:380px;
background:#2f5ea8;
color:white;
border-radius:6px;
cursor:pointer;
}

#feedback{min-height:40px;margin-top:10px;}
#final{display:none;margin-top:20px;}

.timer{
font-weight:bold;
color:#1b3c6b;
}
</style>
</head>

<body>

<h1>¿Quién controla el sistema?</h1>
<p class="timer">⏱ Tiempo: <span id="tiempo">0</span>s</p>

<div class="container">

<div class="box">
<h3>Sensor</h3>
<input type="range" min="0" max="100" value="60" id="sensor">
<p>Valor: <span id="valor">60</span></p>
</div>

<div class="box">
<h3>Actuadores</h3>
<div class="led" id="led"></div>
<p id="buzzer">🔇</p>
</div>

<div class="box">
<h3>Estado</h3>
<p id="estado">INDEFINIDO</p>
</div>

</div>

<h3 id="pregunta"></h3>
<div id="opciones"></div>
<div id="feedback"></div>
<div id="final"></div>

<script>

// ===== TIMER =====
let tiempoTotal = 0;
let timer = setInterval(()=>{
tiempoTotal++;
document.getElementById("tiempo").innerText = tiempoTotal;
},1000);

// ===== SIMULACIÓN =====
setInterval(()=>{
let v = parseInt(document.getElementById("sensor").value)
document.getElementById("valor").innerText = v

if(v < 30){
led.style.background="red"
buzzer.innerText="🔊"
estado.innerText="ALARMA"
}
else if(v < 60){
led.style.background="orange"
buzzer.innerText="🔇"
estado.innerText="ADVERTENCIA"
}
else{
led.style.background="green"
buzzer.innerText="🔇"
estado.innerText="SEGURO"
}
},500)

// ===== MEZCLA DE OPCIONES 🔥
function mezclar(array){
return array.sort(()=>Math.random()-0.5)
}

// ===== PREGUNTAS (RESPUESTAS DISTRIBUIDAS) =====
let preguntas=[
{
q:"Si varias condiciones controlan el sistema, ¿qué problema aparece?",
opciones:[
{t:"Mayor precisión",c:false},
{t:"Conflictos entre acciones",c:true},
{t:"Menor consumo",c:false}
]
},
{
q:"Si todo está en loop(), ¿qué ocurre al crecer el sistema?",
opciones:[
{t:"Se vuelve difícil de mantener",c:true},
{t:"Se optimiza solo",c:false},
{t:"El hardware falla",c:false}
]
},
{
q:"¿Cuál es la función real de un sensor?",
opciones:[
{t:"Ejecutar acciones",c:false},
{t:"Controlar el programa",c:false},
{t:"Proveer datos",c:true}
]
},
{
q:"¿Por qué los actuadores pueden entrar en conflicto?",
opciones:[
{t:"Consumen energía",c:false},
{t:"Falta control central",c:true},
{t:"Tienen distinto voltaje",c:false}
]
},
{
q:"¿Qué mejora la modularización?",
opciones:[
{t:"Organización del sistema",c:true},
{t:"Velocidad del hardware",c:false},
{t:"Cantidad de sensores",c:false}
]
},
{
q:"¿Qué permite organizar el comportamiento global?",
opciones:[
{t:"Más delay",c:false},
{t:"Estados",c:true},
{t:"Más variables",c:false}
]
},
{
q:"¿Qué es una transición?",
opciones:[
{t:"Cambio de estado",c:true},
{t:"Cambio de sensor",c:false},
{t:"Reinicio",c:false}
]
}
]

let actual=0
let puntos=0
let bloqueado=false

function cargar(){
if(actual>=preguntas.length){
mostrarFinal()
return
}

let p=preguntas[actual]
document.getElementById("pregunta").innerText=p.q

let opcionesMezcladas = mezclar([...p.opciones])

let html=""
opcionesMezcladas.forEach((op,i)=>{
html+=`<div class="option" onclick="responder(${op.c})">${op.t}</div>`
})

document.getElementById("opciones").innerHTML=html
bloqueado=false
}

function responder(correcto){

if(bloqueado)return
bloqueado=true

if(correcto){
puntos++
feedback.innerHTML="✅ Correcto"
}else{
feedback.innerHTML="❌ Incorrecto"
}

actual++

if(actual>=preguntas.length){
setTimeout(mostrarFinal,800)
return
}

setTimeout(()=>{
feedback.innerHTML=""
cargar()
},1000)
}

// ===== FINAL CORREGIDO =====
function mostrarFinal(){

clearInterval(timer)

document.getElementById("pregunta").innerText=""
document.getElementById("opciones").innerHTML=""
document.getElementById("feedback").innerHTML=""

let nota=Math.round((puntos/preguntas.length)*20)

document.getElementById("final").style.display="block"

document.getElementById("final").innerHTML=
"<h2>🎮 Resultado final</h2>"+
"<p><b>Puntaje:</b> "+puntos+" / "+preguntas.length+"</p>"+
"<p><b>Nota:</b> "+nota+"/20</p>"+
"<p><b>Tiempo:</b> "+tiempoTotal+" s</p>"+
"<p><b>💡 Ahora necesitas ESTADOS y CONTROL CENTRAL</b></p>"+
"<button onclick='location.reload()'>Reintentar</button>"
}

cargar()

</script>

</body>
</html>
